<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Control Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d14;
      --bg-card: #141826;
      --line: #2a3147;
      --txt-main: #eef1f8;
      --txt-dim: #7a85a3;
      --accent: #ffb52e;
      --success: #36d399;
      --error: #ff4d6d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--txt-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 30px;
    }

    /* Login Screen styles */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 400px;
      margin-top: 10vh;
    }

    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    /* Hide Dashboard by default */
    #dashboardScreen {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      text-align: center;
      color: var(--accent);
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      color: var(--txt-dim);
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="date"], input[type="number"], input[type="password"] {
      width: 100%;
      padding: 12px;
      background: #0b0d14;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--txt-main);
      font-family: inherit;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus { outline: none; border-color: var(--accent); }

    .number-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .euro-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ffc24d, #f0a020);
      color: #1a1000;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 181, 46, 0.3); }
    button:active { transform: translateY(0); }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      display: none;
    }
    .message.success { display: block; background: rgba(54, 211, 153, 0.1); color: var(--success); border: 1px solid rgba(54, 211, 153, 0.3); }
    .message.error { display: block; background: rgba(255, 77, 109, 0.1); color: var(--error); border: 1px solid rgba(255, 77, 109, 0.3); }

    .coupon-list {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg);
    }
    .c-row {
      display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--line); font-size: 13px;
    }
    .c-row:last-child { border-bottom: none; }
    .c-code { font-family: monospace; font-weight: 800; color: var(--txt-main); font-size: 14px;}
    .c-stat.active { color: var(--success); font-weight: 700;}
    .c-stat.unused { color: var(--dim); }
    .c-date { font-size: 11px; color: var(--dim); }
    .c-delete {
      background: transparent; border: 1px solid var(--error); color: var(--error); 
      padding: 6px 10px; font-size: 11px; border-radius: 6px; cursor: pointer; width: auto;
    }
    .c-delete:hover { background: rgba(255, 77, 109, 0.1); }
    
    .filter-select {
      background: var(--bg); color: var(--txt-main); border: 1px solid var(--line);
      padding: 6px; border-radius: 6px; font-family: inherit; font-size: 12px;
      outline: none;
    }
    
    .logout-btn {
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      padding: 10px;
      margin-top: 20px;
      max-width: 200px;
    }
    .logout-btn:hover {
      background: rgba(255, 77, 109, 0.1);
      box-shadow: none;
    }
    
    .collapse-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding-bottom: 10px;
    }
    .collapse-header h1 { margin-bottom: 0; }
    .collapse-icon {
      font-size: 20px;
      transition: transform 0.3s;
      color: var(--accent);
    }
    .collapsed .collapse-icon { transform: rotate(-90deg); }

  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="admin-card">
    <h1 style="font-size: 32px;">🛡️ Admin Login</h1>
    <div class="form-group">
      <label>Admin Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password..." style="text-align: center; letter-spacing: 2px;">
    </div>
    <button onclick="attemptLogin()">Login to Dashboard</button>
    <div id="loginMsg" class="message"></div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboardScreen">
    
    <div class="admin-card">
      <h1>🎫 Manage Coupons</h1>
      <button onclick="generateCoupon()">Generate New Coupon</button>
      <div id="cMsg" class="message"></div>
      
      <div style="margin-top: 30px;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          <span>All Coupons</span>
          <div>
            <select id="couponFilter" class="filter-select" onchange="loadCoupons()">
              <option value="all">All</option>
              <option value="active">Active</option>
              <option value="unused">Unused</option>
            </select>
            <a href="#" onclick="loadCoupons()" style="color:var(--accent); text-transform:none; margin-left: 10px;">Refresh</a>
          </div>
        </label>
        <div class="coupon-list" id="couponList">
          <div style="padding: 20px; text-align: center; color: var(--dim); font-size: 12px;">Loading...</div>
        </div>
      </div>
    </div>

    <div class="admin-card">
      <div class="collapse-header collapsed" onclick="toggleAddResult()" id="addResultHeader">
        <h1>📝 Add New Result</h1>
        <div class="collapse-icon">▼</div>
      </div>
      
      <div id="addResultForm" style="display: none; margin-top: 24px;">
        <div class="form-group">
          <label>Date of Draw</label>
          <input type="date" id="drawDate" required>
        </div>

        <div class="form-group">
          <label>Main Numbers (1-50)</label>
          <div class="number-group">
            <input type="number" id="n1" min="1" max="50">
            <input type="number" id="n2" min="1" max="50">
            <input type="number" id="n3" min="1" max="50">
            <input type="number" id="n4" min="1" max="50">
            <input type="number" id="n5" min="1" max="50">
          </div>
        </div>

        <div class="form-group">
          <label>Euro Numbers (1-12)</label>
          <div class="euro-group">
            <input type="number" id="e1" min="1" max="12">
            <input type="number" id="e2" min="1" max="12">
          </div>
        </div>

        <button onclick="saveResult()">Save Result</button>
        <div id="statusMessage" class="message"></div>
      </div>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>

  </div>

  <script>
    let adminToken = sessionStorage.getItem('adminToken') || '';

    // If already logged in this session, show dashboard
    if (adminToken) {
      showDashboard();
    }

    function toggleAddResult() {
      const form = document.getElementById('addResultForm');
      const header = document.getElementById('addResultHeader');
      if (form.style.display === 'none') {
        form.style.display = 'block';
        header.classList.remove('collapsed');
      } else {
        form.style.display = 'none';
        header.classList.add('collapsed');
      }
    }

    async function attemptLogin() {
      const pwd = document.getElementById('loginPassword').value;
      const msgEl = document.getElementById('loginMsg');

      if (!pwd) {
        msgEl.textContent = "Please enter a password.";
        msgEl.className = "message error";
        return;
      }

      msgEl.className = "message";
      
      // We will verify the password by trying to fetch the coupons list
      try {
        const res = await fetch('/api/admin/coupons?password=' + encodeURIComponent(pwd));
        if (res.ok) {
          adminToken = pwd;
          sessionStorage.setItem('adminToken', adminToken);
          showDashboard();
        } else {
          msgEl.textContent = "Incorrect Admin Password!";
          msgEl.className = "message error";
        }
      } catch (e) {
        msgEl.textContent = "Network Error. Is server running?";
        msgEl.className = "message error";
      }
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'flex';
      loadCoupons(); // Auto-load coupons when dashboard opens
    }

    function logout() {
      adminToken = '';
      sessionStorage.removeItem('adminToken');
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboardScreen').style.display = 'none';
    }

    async function generateCoupon() {
      const msgEl = document.getElementById('cMsg');
      try {
        const res = await fetch('/api/admin/coupons', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminToken })
        });
        const data = await res.json();
        if (res.ok) {
          msgEl.textContent = "Created: " + data.coupon.code;
          msgEl.className = "message success";
          loadCoupons();
        } else {
          if (res.status === 401) logout(); // Password revoked
          msgEl.textContent = "Error: " + data.error;
          msgEl.className = "message error";
        }
      } catch (e) {
        msgEl.textContent = "Network Error";
        msgEl.className = "message error";
      }
    }

    async function loadCoupons() {
      if (!adminToken) return;
      const filter = document.getElementById('couponFilter').value;
      try {
        const res = await fetch('/api/admin/coupons?password=' + encodeURIComponent(adminToken));
        let data = await res.json();
        if (res.ok) {
          if (filter !== 'all') {
            data = data.filter(c => c.status === filter);
          }

          const list = document.getElementById('couponList');
          if (data.length === 0) {
            list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--dim);">No coupons found.</div>';
            return;
          }
          list.innerHTML = data.map(c => `
            <div class="c-row">
              <div>
                <div class="c-code">${c.code}</div>
                <div class="c-date">Created: ${new Date(c.createdAt).toLocaleDateString()}</div>
              </div>
              <div style="text-align: right; display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
                <div>
                  <span class="c-stat ${c.status}">${c.status.toUpperCase()}</span>
                  ${c.lastLogin ? `<div class="c-date">Last Use: ${new Date(c.lastLogin).toLocaleDateString()}</div>` : ''}
                </div>
                <button class="c-delete" onclick="deleteCoupon('${c.code}')">Delete</button>
              </div>
            </div>
          `).join('');
        } else if (res.status === 401) {
          logout();
        }
      } catch (e) {
        console.error("Failed to load coupons");
      }
    }

    async function deleteCoupon(code) {
      if (!confirm(`Are you sure you want to delete coupon ${code}?`)) return;
      try {
        const res = await fetch('/api/admin/delete-coupon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminToken, code })
        });
        if (res.ok) {
          loadCoupons();
        } else {
          alert('Failed to delete coupon');
        }
      } catch (e) {
        alert('Network error');
      }
    }

    async function saveResult() {
      const date = document.getElementById('drawDate').value;
      const n1 = parseInt(document.getElementById('n1').value);
      const n2 = parseInt(document.getElementById('n2').value);
      const n3 = parseInt(document.getElementById('n3').value);
      const n4 = parseInt(document.getElementById('n4').value);
      const n5 = parseInt(document.getElementById('n5').value);
      const e1 = parseInt(document.getElementById('e1').value);
      const e2 = parseInt(document.getElementById('e2').value);

      const msgEl = document.getElementById('statusMessage');

      if (!date || !n1 || !n2 || !n3 || !n4 || !n5 || !e1 || !e2) {
        msgEl.textContent = "Please fill in all number fields.";
        msgEl.className = "message error";
        return;
      }

      try {
        const response = await fetch('/api/draws', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminToken, draw: { d: date, n: [n1, n2, n3, n4, n5], e: [e1, e2] } })
        });
        const result = await response.json();
        if (response.ok) {
          msgEl.textContent = "Result added successfully!";
          msgEl.className = "message success";
          document.querySelectorAll('input[type="number"]').forEach(el => el.value = '');
        } else {
          if (response.status === 401) logout();
          msgEl.textContent = "Error: " + result.error;
          msgEl.className = "message error";
        }
      } catch (err) {
        msgEl.textContent = "Network error.";
        msgEl.className = "message error";
      }
    }
  </script>
</body>
</html>
